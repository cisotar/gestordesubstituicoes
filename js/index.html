<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GestãoEscolar — Faltas e Substituições</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-in">
      <div class="nav-logo">🏫 <span>Gestão</span>Escolar</div>
      <button class="ntab on" data-action="nav" data-page="calendar">📅 Calendário</button>
      <button class="ntab"    data-action="nav" data-page="dashboard">📊 Dashboard</button>
      <button class="ntab"    data-action="nav" data-page="settings">⚙️ Configurações</button>
      <div class="nav-bc" id="nav-bc">
        <span>›</span>
        <span id="nav-bc-name"></span>
      </div>
      <div class="nav-end">
        <span class="nav-pill"      id="nav-stats"></span>
        <span class="nav-pill warn" id="nav-warn" style="display:none"></span>
      </div>
    </div>
  </nav>

  <!-- PAGES -->
  <div class="wrap">

    <div class="pg on" id="pg-calendar">
      <div class="ph">
        <h2>Calendário Semanal</h2>
        <p>Visão geral de todas as aulas. Clique em um professor para abrir o calendário individual.</p>
      </div>
      <div id="cal-out"></div>
    </div>

    <div class="pg" id="pg-teacher">
      <div id="teacher-out"></div>
    </div>

    <div class="pg" id="pg-dashboard"></div>

    <div class="pg" id="pg-settings">
      <div class="ph"><h2>Configurações</h2></div>
      <div class="s-tabs">
        <button class="stab on" data-action="stab" data-tab="teachers">👩‍🏫 Professores</button>
        <button class="stab"    data-action="stab" data-tab="schedules">📚 Horários de Aula</button>
        <button class="stab"    data-action="stab" data-tab="timeslots">🕐 Tempos de Aula</button>
      </div>
      <div id="settings-out"></div>
    </div>

  </div>

  <!-- MODAL -->
  <div class="overlay" id="overlay">
    <div class="modal" id="modal-body"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
